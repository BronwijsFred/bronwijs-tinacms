  <text x="155" y="255" text-anchor="middle" fill="var(--color-accent)" font-size="9" font-family="'Outfit', sans-serif" font-weight="600" letter-spacing="0.5" opacity="0.7" class="tree-label" style="animation-delay: 2.9s;">Archief</text>

  <text x="130" y="170" text-anchor="middle" fill="var(--color-gold)" font-size="9" font-family="'Outfit', sans-serif" font-weight="600" letter-spacing="0.5" opacity="0.7" class="tree-label" style="animation-delay: 3.1s;">Woo</text>
