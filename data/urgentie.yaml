sectionLabel: "De realiteit van vandaag"
heading: "Woo maakt het belang van een gezond"
headingEmphasis: "ecosysteem"
headingSuffix: "zichtbaar"
description: "Het onderzoek naar AI en Open Overheid (februari 2026) laat zien dat de druk op informatiehuishouding geen incident is, maar een structureel vraagstuk. Woo-verzoeken maken zichtbaar waar samenhang en regie ontbreekt:"
