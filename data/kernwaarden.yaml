sectionLabel: "Bronwijs kernwaarden"
heading: "Onze 4 kernwaarden zitten"
headingEmphasis: "diepgeworteld"
description: "Wij geloven dat goede informatievoorziening geen luxe is maar een noodzaak. Een noodzaak voor inwoners, voor bedrijven maar zeker ook voor de ambtenaren. Het kan transparanter, efficienter, eerlijker en met meer samenhang."
description2: "Dat is onze gezamenlijke verantwoordelijkheid. Ook van ons als technologie partner. Daarom onze 4 kernwaarden:"
values:
  - title: "Publiek geld vraagt een open kern"
    description: "Wij geloven niet in het opsluiten van core functionaliteiten in lange licentiestructuren zonder flexibiliteit. De kern hoort altijd open, transparant, herbruikbaar en eerlijk in onderhoud te zijn. Overheden horen niet te betalen voor afhankelijkheid. Dat is onze belofte. Zelfs als we in de toekomst aanvullende modules ontwikkelen op licentiebasis, blijven maandelijks opzegbaar."
    iconColor: "primary"
    iconType: "clock"
  - title: "Samenwerken is geen marketingterm"
    description: "Wij bouwen bewust open. Dit zodat andere leveranciers, implementatiepartners, adviseurs en samenwerkingsverbanden kunnen aansluiten, doorontwikkelen en adviseren. Dat is onze belofte voor een gezond open ecosysteem."
    iconColor: "accent"
    iconType: "triangle"
  - title: "Regie hoort bij de overheid"
    description: "De overheid is altijd in regie. De overheid beheert de informatie over haar inwoners, bedrijven en partners. We hebben een duidelijke visie en mening als technologie partner maar de regie laten we bij de overheid."
    iconColor: "gold"
    iconType: "checkbox"
  - title: "Aan transparantie moet je werken"
    description: "Transparantie is voor ons een leidend begrip. Zelf zijn we transparant over onszelf, over samenwerkingen, over licenties en wat we (niet) bieden. Transparantie komt niet vanzelf, ook niet bij de overheid. Daarom willen we ook actief meewerken aan een transparante en eerlijke overheid daar waar het kan."
    iconColor: "primary"
    iconType: "compass"
