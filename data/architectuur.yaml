sectionLabel: "Architectuurkeuzes"
heading: "De architectuurkeuzes van"
headingEmphasis: "Bronwijs"
description: "Bronwijs maakt zeer bewuste architectuurkeuzes. Een keuze voor autonomie, regie en duurzame samenwerkingen. Dit hebben we vertaald naar onderstaande uitgangspunten:"
cards:
  - title: "Digitale autonomie"
    description: "Organisaties behouden regie over hun eigen informatiepositie. Geen afhankelijkheid van gesloten ecosystemen, maar bouwen op open standaarden en Common Ground en vrije keuze qua infrastructuur."
    iconPath: "M12 3C12 3 4 9 4 16C4 21 7 24 12 26C17 24 20 21 20 16C20 9 12 3 12 3Z"
    iconDetail: "M12 7V23M12 13C9.5 11 7 12.5 7 12.5M12 19C14.5 17 17 18.5 17 18.5"
    color: "primary"
  - title: "Regie bij de bron"
    description: "Data blijft waar zij hoort. We verbinden systemen via API's en creeren samenhang zonder nieuwe kopieen of silo's."
    iconPath: "M4 6C4 4 6 2 8 2H16C18 2 20 4 20 6V22C20 24 18 26 16 26H8C6 26 4 24 4 22V6Z"
    iconDetail: "M8 8H16M8 12H14M8 16H12M8 20H10"
    color: "accent"
  - title: "Security by design"
    description: "Beveiliging en autorisatie zijn integraal onderdeel van de architectuur. Toegang wordt gerespecteerd binnen bestaande structuren en niet achteraf gecorrigeerd."
    iconPath: "M12 2L22 8V16C22 21 18 25 12 26C6 25 2 21 2 16V8L12 2Z"
    iconDetail: "M8 14L11 17L16 11"
    color: "gold"
  - title: "Open kern als fundament"
    description: "De basis is open en transparant. Daarboven kan functionaliteit modulair worden uitgebreid, zonder het fundament te wijzigen."
    iconPath: "M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"
    iconDetail: "M12 8V12L15 15M12 6V6.01"
    color: "primary"
  - title: "Ontworpen voor samenwerking"
    description: "De kern is bedoeld om gezamenlijk te gebruiken en door te ontwikkelen samen met de community. We hoeven het wiel niet meer allemaal zelf uit te vinden."
    iconPath: "M3 12C3 12 7 4 12 4C17 4 21 12 21 12C21 12 17 20 12 20C7 20 3 12 3 12Z"
    iconDetail: "M12 9C13.66 9 15 10.34 15 12C15 13.66 13.66 15 12 15C10.34 15 9 13.66 9 12C9 10.34 10.34 9 12 9Z"
    color: "accent"
  - title: "Controle over de toekomst"
    description: "Organisaties houden controle over hun toekomst. OpenGrip werkt zonder licentiecontracten waardoor maximale vrijheid en controle aanwezig is voor organisaties."
    iconPath: "M3 22V14L8 10L13 14L18 6L21 9V22H3Z"
    iconDetail: "M3 22H21M7 18V22M12 14V22M17 10V22"
    color: "gold"
